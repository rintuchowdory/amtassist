<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AmtAssist</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="header">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a56db" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/></svg>
      <span class="logo-text">AmtAssist</span>
    </div>
    <span class="version">v1.0</span>
  </header>
  <div class="status-card" id="statusCard">
    <div class="status-dot active" id="statusDot"></div>
    <div>
      <div class="status-title" id="statusTitle">Aktiv auf dieser Seite</div>
      <div class="status-subtitle" id="statusSubtitle">Formularfelder werden erkannt</div>
    </div>
  </div>
  <section class="section">
    <label class="section-label">Erklärungssprache</label>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="de">🇩🇪 Deutsch</button>
      <button class="lang-btn" data-lang="en">🇬🇧 English</button>
    </div>
  </section>
  <section class="section">
    <label class="section-label">Schnellsuche Feld</label>
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="fieldSearch" class="search-input" placeholder="z.B. Steuernummer..." />
    </div>
    <div id="searchResult" class="search-result hidden"></div>
  </section>
  <section class="section">
    <label class="section-label">Aktionen</label>
    <button class="action-btn" id="scanBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      Seite neu scannen
    </button>
  </section>
  <footer class="footer">
    <a href="https://github.com/rintuchowdory/amtassist" target="_blank" class="footer-link">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>
      GitHub
    </a>
    <span class="footer-sep">·</span>
    <span class="footer-author">by rintuchowdory</span>
  </footer>
  <script src="popup.js"></script>
</body>
</html>

name: CI – Build & Package

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  # ─────────────────────────────────────────────
  validate:
    name: Validate Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint JavaScript
        run: npm run lint

      - name: Validate manifest.json
        run: node scripts/validate-manifest.js

      - name: Run tests
        run: npm test

  # ─────────────────────────────────────────────
  package:
    name: Package Extension (.zip)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create extension zip
        run: |
          mkdir -p dist
          zip -r dist/amtassist-${{ github.sha }}.zip \
            manifest.json \
            popup.html popup.css popup.js \
            src/ public/ \
            --exclude "*.test.*" "*.spec.*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: amtassist-extension
          path: dist/amtassist-*.zip
          retention-days: 30

  # ─────────────────────────────────────────────
  release:
    name: Attach zip to GitHub Release
    needs: package
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: amtassist-extension
          path: dist/

      - name: Rename for release
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv dist/amtassist-*.zip dist/amtassist-${VERSION}.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/amtassist-*.zip
